<!DOCTYPE html>
<html>

<head>
    <title>Home</title>
    <style>
        body {
            background: #0f172a;
            font-family: Arial, sans-serif;
            color: #e2e8f0;
            margin: 0;
        }

        .container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        h1 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        p {
            color: #94a3b8;
            margin-bottom: 30px;
        }

        div{
            display: grid;
            grid-template-columns: auto auto;
            column-gap: 15px;
        }

        button {
            width: 120px;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            color: #e2e8f0;
            cursor: pointer;
            font-size: 16px;
            background-color: rgb(139, 139, 242);

        }
        button:hover{
            transform: translateY(-5px);
            box-shadow:0 10px 20px rgba(0,0,0,0.3);
        }
        
    </style>
</head>

<body>
    <div class="container">
        <h1>Welcome to My Store</h1>
        <p>simple product management system</p>

        <div>
            <form id="f1" action="/register" method="post">
                <button type="submit">Register</button>
            </form>
        

        
            <form id="f2" action="/login" method="post">
                <button type="submit">login</button>
            </form>
        </div>
    </div>
</body>

</html>
