<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background: #0f172a;
            font-family: Arial, sans-serif;
            color: #e2e8f0;
            margin: 0;
            margin-top: 200px;
        }

        h2 {
            color: #e2e8f0;
            text-align: center;
            font-size: 30px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        p{
            color: #e2e8f0;
            text-align: center;
            font-size: 30px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

        }
        
        form{
            text-align: center;
            
        }

        button {
            width: 20%;
            padding: 8px;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 8px;
        }
    </style>
</head>

<body>
    {% if msg %}
    <h2>{{ msg }}</h2>
    {% endif %}
    <p>Back To Dashboard <br> Click Button</p>
    <form id="f1" action="/store" method="get">
        <button type="submit">Dashboard</button>
    </form>
</body>

</html>
