<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
        <style>
        body {
            font-family: Arial;
            background: #0f172a;
        }

        .container {
            width: 350px;
            margin: 100px auto;
            border: 5px solid gray;
            padding: 20px;
            background: #1e2931;
            border-radius: 8px;
            box-shadow: 0 0 10px gray;
            text-align: center;
            color: #e2e8f0;
            margin-top: 150px;
        }

        input {
            width: 90%;
            padding: 8px;
            margin: 8px 0;
            border-radius: 8px;
            border: 0px;
        }

        button {
            width: 95%;
            padding: 8px;
            background: red;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 8px;
        }
    </style>
</head>

<body>
    <section class="container">
        <h2>Delete Product</h2>
        <form action="/Product/delete" method="post">
            <input type="text" name="id" placeholder="Enter id" required><br><br>
            <button type="submit">DELETE PRODUCT</button>
        </form>
    </section>
</body>

</html>
