<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background: #0f172a;
            font-family: Arial, sans-serif;
            color: #e2e8f0;
            margin: 0;
        }

        .container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        div{
            display: grid;
            grid-template-columns: auto auto;
            column-gap: 15px;
            row-gap: 20px;
        }


        button {
            height: 55px;
            width: 150px;
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            color: #e2e8f0;
            cursor: pointer;
            font-size: 16px;
            background-color: rgb(139, 139, 242);

        }
        button:hover{
            transform: translateY(-5px);
            box-shadow:0 10px 20px rgba(0,0,0,0.3);
        }

    </style>
</head>

<body>
    <section class="container">
    <h2>Store Dashboard</h2>
        <div>
            <form id="f1" action="/get_product" method="get">
                <button type="submit">SHOW PRODUCTS</button>
            </form>
        

        
            <form id="f2" action="/create_product" method="post">
                <button type="submit">CREATE PRODUCT</button>
            </form>
        

        
            <form id="f3" action="/update" method="post">
                <button type="submit">UPDATE PRODUCT</button>
            </form>
        

        
            <form id="f4" action="/delete" method="post">
                <button type="submit">DELETE PRODUCT</button>
            </form>
        </div>

    </section>
</body>

</html>
