<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            background: #0f172a;
            font-family: Arial, sans-serif;
            color: #e2e8f0;
            margin: 0;
            margin-top: 200px;
        }

        h2 {
            color: #e2e8f0;
            text-align: center;
            font-size: 30px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        p {
            color: #e2e8f0;
            text-align: center;
            font-size: 30px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;

        }

        div {
            display: grid;
            grid-template-columns: auto auto;
            column-gap: 10px;
            row-gap: 20px;
        }

        form {
            text-align: center;

        }

        button {
            width: 30%;
            padding: 8px;
            background: #007bff;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 8px;
        }

        button:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>

<body>
    {% if msg %}
    <h2>{{ msg }}</h2>
    {% endif %}
    <br><br>
    <div>
        <form id="f1" action="/get_product" method="get">
            <button type="submit">Show Products</button>
        </form>
        <form action="/cart" method="get">
            <button type="submit">Show Cart</button>
        </form>
        <form action="/remove_cart" method="post">
            <button type="submit">Remove Cart</button>
        </form>
        <form  action="/store" method="get">
            <button type="submit">Dashboard</button>
        </form>
    </div>
</body>

</html>
