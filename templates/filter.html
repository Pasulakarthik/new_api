<!DOCTYPE html>
<html>

<head>
    <title>Create_Product</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
        }

        .container {
            width: 350px;
            margin: 100px auto;
            border: 5px solid gray;
            padding: 20px;
            background: #1e2931;
            border-radius: 8px;
            box-shadow: 0 0 10px gray;
            text-align: center;
            color: #e2e8f0;
        }

        input {
            width: 90%;
            padding: 8px;
            margin: 8px 0;
            border-radius: 8px;
            border: 0px;
        }

        button {
            width: 95%;
            padding: 8px;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 8px;
        }
    </style>
</head>

<body>
    <div class="container">
        <h2>Filter Product</h2>
        <form action="/Product/filter" method="get">
            <input type="text" name="min_price" placeholder="Enter Min_price" required><br><br>
            <input type="text" name="max_price" placeholder="Enter Max_price" required><br><br>
            <input type="text" name="category" placeholder="Enter Category" required><br><br>

            <button type="submit">Filter</button>
        </form>
    </div>
    
</body>

</html>
